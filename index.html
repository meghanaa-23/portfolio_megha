<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meghana Manchala | Portfolio</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --text-main: #f0f0f0;
            --text-muted: #a0a0a0;
            --primary: #7e22ce;
            --secondary: #3b82f6;
            --accent: #ec4899;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-color); color: var(--text-main); line-height: 1.6; overflow-x: hidden; min-height: 100vh; }
        .static-loader {
            height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
        }
        .loader-logo { font-family: 'Outfit', sans-serif; font-size: 3rem; font-weight: 800; margin-bottom: 20px; }
        .gradient-text {
            background: linear-gradient(to right, var(--primary), var(--secondary), var(--accent));
            background-clip: text;
            -webkit-background-clip: text; color: transparent; display: inline-block;
        }
        .loading-bar { width: 200px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; margin-top: 20px; }
        .loading-progress { width: 40%; height: 100%; background: var(--primary); animation: loading 1.5s infinite ease-in-out; }
        @keyframes loading { 0% { transform: translateX(-100%); } 100% { transform: translateX(250%); } }
    </style>
</head>
<body>
    <div id="root">
        <!-- Static Fallback Content (Visible while React is loading or if it fails) -->
        <div class="static-loader">
            <div class="loader-logo">
                <span class="gradient-text">Meghana Manchala</span>
            </div>
            <p style="color: var(--text-muted); font-size: 1.1rem;">AI & Machine Learning Student</p>
            <div class="loading-bar">
                <div class="loading-progress"></div>
            </div>
            <noscript>
                <div style="margin-top: 30px; color: #ff4d4d;">
                    Please enable JavaScript to view the full interactive portfolio.
                </div>
            </noscript>
        </div>
    </div>
    <!-- Entry Point for Vite/React -->
    <script type="module" src="/src/main.jsx"></script>
</body>
</html>
